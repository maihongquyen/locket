<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LocketUp - Unofficial Web Client</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d14;color:#f0f0f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:16px;display:flex;flex-direction:column;align-items:center}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:280px;background:radial-gradient(ellipse 100% 200px at 50% -50px,rgba(255,107,53,.14),transparent);pointer-events:none;z-index:0}
.topbar{width:100%;max-width:460px;display:flex;align-items:center;gap:10px;padding:20px 0 24px;position:relative;z-index:1}
.logo-box{width:38px;height:38px;background:linear-gradient(135deg,#ff6b35,#ff9f1c);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 20px rgba(255,107,53,.35)}
.logo-name{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo-name b{color:#ff6b35}
.badge{margin-left:auto;font-size:9px;color:#555580;border:1px solid #2a2a3d;padding:3px 9px;border-radius:20px;letter-spacing:1.5px;text-transform:uppercase}
#root{width:100%;max-width:460px;position:relative;z-index:1}
.card{background:#13131a;border:1px solid #222233;border-radius:18px;padding:24px;margin-bottom:14px;position:relative;overflow:hidden}
.card::after{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,53,.3),transparent)}
.slabel{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#555580;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.slabel::after{content:'';flex:1;height:1px;background:#222233}
.inp{width:100%;background:#08080f;border:1px solid #222233;border-radius:10px;padding:11px 14px;color:#f0f0f8;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;transition:border-color .2s;-webkit-appearance:none;display:block}
.inp:focus{border-color:#ff6b35}
textarea.inp{resize:vertical;min-height:64px}
.lbl{display:block;font-size:12px;color:#555580;margin-bottom:5px}
.btn{width:100%;background:linear-gradient(135deg,#ff6b35,#ff9f1c);border:none;border-radius:11px;padding:13px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:0;display:block}
.btn:disabled{opacity:.35;cursor:default}
.btn-ghost{background:none;border:1px solid #222233;color:#555580;font-size:13px;padding:10px;margin-top:8px}
.status{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:12px;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.status.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:#f87171}
.status.ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80}
.status.info{background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.2);color:#ff9f1c}
.dropzone{border:2px dashed #222233;border-radius:12px;padding:32px 16px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s,background .2s;margin-bottom:12px}
.dropzone.over{border-color:#ff6b35;background:rgba(255,107,53,.04)}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;margin:0;padding:0;border:none;font-size:0}
.dicon{font-size:32px;margin-bottom:8px}
.dtxt{font-size:13px;color:#555580;line-height:1.5}
.dtxt strong{color:#c0c0d0}
.preview{position:relative;border-radius:12px;overflow:hidden;margin-bottom:12px;aspect-ratio:1;background:#08080f;border:1px solid #222233}
.preview img,.preview video{width:100%;height:100%;object-fit:cover;display:block}
.rmv{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);border:1px solid #333;color:#f0f0f8;border-radius:7px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit}
.userbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#08080f;border:1px solid #222233;border-radius:10px;margin-bottom:14px}
.av{width:34px;height:34px;background:linear-gradient(135deg,#ff6b35,#ff9f1c);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.uname{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logoutbtn{background:none;border:1px solid #333;color:#555580;padding:5px 11px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
.progbar{height:4px;background:#222233;border-radius:4px;overflow:hidden;margin-bottom:10px}
.progfill{height:100%;background:linear-gradient(90deg,#ff6b35,#ff9f1c);border-radius:4px;transition:width .35s}
.pct{text-align:center;color:#555580;font-size:12px;padding:4px 0 0}
@keyframes sp{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite;vertical-align:middle;margin-right:5px;flex-shrink:0;margin-top:1px}
.steps{display:flex;gap:5px;margin-bottom:18px}
.step{height:3px;flex:1;border-radius:3px;background:#222233;transition:background .3s}
.step.on{background:linear-gradient(90deg,#ff6b35,#ff9f1c)}
.recip{font-size:12px;color:#555580;margin-bottom:12px;line-height:1.5}
.footer{text-align:center;font-size:11px;color:#44445a;line-height:1.6;padding:8px;max-width:460px;position:relative;z-index:1}
.big{font-size:52px;margin-bottom:14px;display:block;text-align:center}
.h1{font-size:20px;font-weight:700;margin-bottom:6px;text-align:center}
.sub{color:#555580;font-size:13px;margin-bottom:20px;line-height:1.6;text-align:center}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-box">&#128247;</div>
  <div class="logo-name">Locket<b>Up</b></div>
  <div class="badge">Unofficial</div>
</div>

<div id="root"></div>

<div class="footer">&#9888;&#65039; Tool kh&#244;ng ch&#237;nh th&#7913;c. S&#7917; d&#7909;ng tr&#234;n t&#224;i kho&#7843;n c&#7911;a b&#7841;n, tu&#226;n theo Terms of Service c&#7911;a Locket.</div>

<script>
(function(){
'use strict';

var PROXY   = 'https://corsproxy.io/?url=';
var API_KEY = 'AIzaSyDNiVHIVjrvVhJEfGkHrfzCLSfVhM6kPxI'; // API Key gốc của app
var AUTH    = PROXY + encodeURIComponent('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=' + API_KEY);
var STORE   = PROXY + encodeURIComponent('https://firebasestorage.googleapis.com/v0/b/locket-img');
var LOCKET  = PROXY + encodeURIComponent('https://api.locketcamera.com');

var S = { step:'login', token:null, localId:null, email:null, file:null, fileType:null, previewUrl:null, caption:'', progress:0, msg:null, mtype:null, loading:false };

function set(o){ for(var k in o) S[k]=o[k]; draw(); }

function draw(){
  var root = document.getElementById('root');
  if(!root) return;
  if(S.step==='login')      root.innerHTML = vLogin();
  else if(S.step==='upload')     root.innerHTML = vUpload();
  else if(S.step==='uploading')  root.innerHTML = vUploading();
  else if(S.step==='done')       root.innerHTML = vDone();
  bindDrop();
}

function esc(s){ return (''+s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sbox(msg, type){
  if(!msg) return '';
  var spin = (type==='info') ? '<span class="spin"></span>' : '';
  return '<div class="status '+type+'">'+spin+'<span>'+esc(msg)+'</span></div>';
}

function vLogin(){
  var dis = S.loading ? ' disabled' : '';
  var btn = S.loading ? '<span class="spin"></span>Đang đăng nhập...' : '&#128274; Đăng nhập';
  return '<div class="card">'+
    '<div class="steps"><div class="step on"></div><div class="step"></div></div>'+
    '<div class="slabel">Đăng nhập Locket</div>'+
    sbox(S.msg, S.mtype)+
    '<label class="lbl">Email</label>'+
    '<input class="inp" type="email" id="ie" placeholder="your@email.com" autocomplete="email">'+
    '<label class="lbl">Mật khẩu</label>'+
    '<input class="inp" type="password" id="ip" placeholder="Mật khẩu của bạn" autocomplete="current-password">'+
    '<button class="btn" id="btn-login"'+dis+'>'+btn+'</button>'+
    '<p style="margin-top:12px;font-size:11px;color:#44445a;text-align:center;line-height:1.5">Thông tin được gửi thẳng đến Google Firebase, cẩn thận rủi ro qua Proxy.</p>'+
    '</div>';
}

function vUpload(){
  var prev = '';
  if(S.previewUrl){
    var media = S.fileType==='video'
      ? '<video src="'+S.previewUrl+'" controls playsinline muted></video>'
      : '<img src="'+S.previewUrl+'" alt="preview">';
    prev = '<div class="preview">'+media+'<button class="rmv" id="btn-rmv">&#10005; Xoá</button></div>';
  } else {
    prev = '<div class="dropzone" id="dz">'+
      '<input type="file" accept="image/*,video/*" id="fi">'+
      '<div class="dicon">&#128193;</div>'+
      '<div class="dtxt"><strong>Kéo thả hoặc nhấn để chọn</strong><br>Ảnh JPG, PNG hoặc Video MP4 (Tối đa 15MB)</div>'+
      '</div>';
  }
  var dis = S.file ? '' : ' disabled';
  return '<div class="card">'+
    '<div class="steps"><div class="step on"></div><div class="step on"></div></div>'+
    '<div class="slabel">Tài khoản</div>'+
    '<div class="userbar"><div class="av">&#128100;</div><div class="uname">'+esc(S.email)+'</div>'+
    '<button class="logoutbtn" id="btn-logout">Đăng xuất</button></div>'+
    '<div class="slabel">Chọn ảnh / video</div>'+
    sbox(S.msg, S.mtype)+
    prev+
    '<label class="lbl">Caption (tuỳ chọn)</label>'+
    '<textarea class="inp" id="cap" placeholder="Viết gì đó...">'+esc(S.caption)+'</textarea>'+
    '<div class="recip">&#128225; Moment sẽ gửi tới <strong>tất cả bạn bè</strong> trên Locket.</div>'+
    '<button class="btn" id="btn-up"'+dis+'>&#128640; Đăng lên Locket</button>'+
    '</div>';
}

function vUploading(){
  return '<div class="card">'+
    '<div class="slabel">Đang xử lý & Upload</div>'+
    sbox(S.msg, 'info')+
    '<div class="progbar"><div class="progfill" style="width:'+S.progress+'%"></div></div>'+
    '<div class="pct">'+S.progress+'% - Vui lòng không đóng trang</div>'+
    '</div>';
}

function vDone(){
  return '<div class="card">'+
    '<span class="big">🎉</span>'+
    '<div class="h1">Đăng thành công!</div>'+
    '<div class="sub">Moment của bạn đã xuất hiện trên widget Locket của bạn bè!</div>'+
    sbox(S.msg, 'ok')+
    '<button class="btn" id="btn-more">📷 Đăng thêm</button>'+
    '<button class="btn btn-ghost" id="btn-lo2">Đăng xuất</button>'+
    '</div>';
}

function bindDrop(){
  var dz = document.getElementById('dz');
  var fi = document.getElementById('fi');
  if(dz && fi){
    fi.onchange = function(){ if(fi.files[0]) pickFile(fi.files[0]); };
    dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', function(){ dz.classList.remove('over'); });
    dz.addEventListener('drop', function(e){ e.preventDefault(); dz.classList.remove('over'); if(e.dataTransfer.files[0]) pickFile(e.dataTransfer.files[0]); });
  }
  var bl = document.getElementById('btn-login');
  if(bl) bl.onclick = doLogin;
  var ip = document.getElementById('ip');
  if(ip) ip.onkeydown = function(e){ if(e.key==='Enter') doLogin(); };
  var br = document.getElementById('btn-rmv');
  if(br) br.onclick = function(){ set({file:null,fileType:null,previewUrl:null,msg:null}); };
  var bu = document.getElementById('btn-up');
  if(bu) bu.onclick = doUpload;
  var blo = document.getElementById('btn-logout');
  if(blo) blo.onclick = doLogout;
  var cap = document.getElementById('cap');
  if(cap) cap.oninput = function(){ S.caption = cap.value; };
  var bmore = document.getElementById('btn-more');
  if(bmore) bmore.onclick = function(){ set({step:'upload',file:null,fileType:null,previewUrl:null,caption:'',msg:null,progress:0,loading:false}); };
  var blo2 = document.getElementById('btn-lo2');
  if(blo2) blo2.onclick = doLogout;
}

function pickFile(file){
  var isV = file.type.indexOf('video')===0;
  var isI = file.type.indexOf('image')===0;
  
  // Chặn dung lượng để tránh sập Proxy (Limit: 15MB)
  var MAX_SIZE = 15 * 1024 * 1024; 
  if (file.size > MAX_SIZE) {
    set({msg: 'File quá lớn (' + (file.size/1024/1024).toFixed(1) + 'MB). Vui lòng chọn file dưới 15MB để tránh lỗi mạng!', mtype: 'err'});
    return;
  }
  
  if(!isV && !isI){ set({msg:'Chỉ hỗ trợ ảnh hoặc video!', mtype:'err'}); return; }
  set({file:file, fileType:isV?'video':'image', previewUrl:URL.createObjectURL(file), msg:null});
}

function doLogout(){
  set({step:'login',token:null,localId:null,email:null,file:null,fileType:null,previewUrl:null,caption:'',msg:null,mtype:null,loading:false,progress:0});
}

async function doLogin(){
  var ie = document.getElementById('ie');
  var ip = document.getElementById('ip');
  var email = ie ? ie.value.trim() : '';
  var pw    = ip ? ip.value : '';
  if(!email||!pw){ set({msg:'Nhập email và mật khẩu!', mtype:'err'}); return; }
  set({loading:true, msg:null});
  try {
    var r = await fetch(AUTH, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:email,password:pw,returnSecureToken:true})
    });
    var d = await r.json();
    if(!r.ok){
      var m = (d.error||{}).message||'Lỗi';
      var map = {'INVALID_LOGIN_CREDENTIALS':'Email hoặc mật khẩu không đúng','INVALID_PASSWORD':'Mật khẩu không đúng','EMAIL_NOT_FOUND':'Email không tồn tại','TOO_MANY_ATTEMPTS_TRY_LATER':'Thử lại sau'};
      throw new Error(map[m]||m);
    }
    set({token:d.idToken,localId:d.localId,email:d.email,step:'upload',loading:false,msg:null});
  } catch(e){
    set({loading:false, msg:e.message, mtype:'err'});
  }
}

// Hàm Nén Ảnh (Thu nhỏ và giảm chất lượng)
function compressImage(file, maxDim, quality) {
  return new Promise(function(resolve, reject) {
    var img = new Image();
    img.src = URL.createObjectURL(file);
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * (maxDim / w)); w = maxDim; }
        else { w = Math.round(w * (maxDim / h)); h = maxDim; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob(function(blob) {
        resolve(blob);
      }, 'image/jpeg', quality);
    };
    img.onerror = function() { reject(new Error('Lỗi đọc file ảnh')); };
  });
}

// Hàm Lấy Khung hình đầu từ Video làm Thumbnail
function getVideoThumbnail(file) {
  return new Promise(function(resolve, reject) {
    var video = document.createElement('video');
    video.src = URL.createObjectURL(file);
    video.muted = true;
    video.playsInline = true;
    video.onloadeddata = function() { video.currentTime = 0.1; };
    video.onseeked = function() {
      var canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(function(blob) {
        resolve(blob);
      }, 'image/jpeg', 0.8);
    };
    video.onerror = function() { reject(new Error('Không thể đọc dữ liệu video')); };
  });
}

// Hàm phụ trợ đẩy file lên Firebase
async function uploadHelper(fileOrBlob, path, type) {
  var ts = Date.now();
  var enc = encodeURIComponent(path);
  var bytes = await fileOrBlob.arrayBuffer();
  var bnd = 'lkt' + ts;
  var te = new TextEncoder();
  var meta = JSON.stringify({name: path, contentType: type, metadata: {creator: S.localId, visibility: 'private'}});
  
  var p1 = te.encode('--'+bnd+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+meta+'\r\n--'+bnd+'\r\nContent-Type: '+type+'\r\n\r\n');
  var p2 = te.encode('\r\n--'+bnd+'--');
  var bd = new Uint8Array(p1.byteLength + bytes.byteLength + p2.byteLength);
  
  bd.set(p1, 0); 
  bd.set(new Uint8Array(bytes), p1.byteLength); 
  bd.set(p2, p1.byteLength + bytes.byteLength);

  var upUrl = STORE + '/o?uploadType=multipart&name=' + enc;
  var upRes = await fetch(upUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'multipart/related; boundary=' + bnd,
      'Authorization': 'Firebase ' + S.token,
      'X-Firebase-Storage-Version': 'ios/10.13.0'
    },
    body: bd
  });
  
  if(!upRes.ok) throw new Error('Upload lỗi ' + upRes.status);

  var mr = await fetch(STORE + '/o/' + enc, {headers: {'Authorization': 'Firebase ' + S.token}});
  var md = await mr.json();
  if(!md.downloadTokens) throw new Error('Không lấy được Token tải xuống');
  
  return 'https://firebasestorage.googleapis.com/v0/b/locket-img/o/' + enc + '?alt=media&token=' + md.downloadTokens;
}

// Hàm Xử lý Upload Chính
async function doUpload(){
  if(!S.file) return;
  set({step:'uploading', loading:true, msg:'Đang chuẩn bị dữ liệu...', mtype:'info', progress:10});
  
  try {
    var ts = Date.now();
    var isVid = S.fileType === 'video';
    var thumbUrl = '';
    var videoUrl = '';

    if(isVid) {
      set({msg:'Đang trích xuất ảnh bìa...', progress:20});
      var thumbBlob = await getVideoThumbnail(S.file);

      set({msg:'Đang đẩy Video lên Firebase (Cần kiên nhẫn)...', progress:40});
      var vExt = (S.file.type.split('/')[1] || 'mp4');
      videoUrl = await uploadHelper(S.file, 'users/' + S.localId + '/moments/videos/lu_' + ts + '.' + vExt, S.file.type);

      set({msg:'Đang đẩy Ảnh bìa...', progress:70});
      thumbUrl = await uploadHelper(thumbBlob, 'users/' + S.localId + '/moments/thumbnails/lu_th_' + ts + '.jpg', 'image/jpeg');
      
    } else {
      set({msg:'Đang nén ảnh để upload mượt hơn...', progress:20});
      var compressedImg = await compressImage(S.file, 1280, 0.85); // Nén max 1280px, quality 85%
      
      set({msg:'Đang tải ảnh lên...', progress:50});
      thumbUrl = await uploadHelper(compressedImg, 'users/' + S.localId + '/moments/thumbnails/lu_' + ts + '.jpg', 'image/jpeg');
    }

    set({progress:85, msg:'Đang gửi tín hiệu lên Locket API...'});
    
    var payload = {data: {
      analytics: {platform:'ios'},
      thumbnail_url: thumbUrl,
      sent_to_all: true,
      migration: {database:'locket'}
    }};
    
    if(isVid) payload.data.video_url = videoUrl;
    if(S.caption) payload.data.caption = S.caption;

    var pr = await fetch(LOCKET + '/postMoment', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Firebase ' + S.token},
      body: JSON.stringify(payload)
    });
    
    var pd = await pr.json();
    set({progress:100});

    if(pr.ok || pd.result){
      set({step:'done', loading:false, msg:'Moment đã lên sóng!', mtype:'ok'});
    } else {
      throw new Error('postMoment lỗi: ' + JSON.stringify(pd).slice(0, 100));
    }
  } catch(e){
    set({step:'upload', loading:false, msg:e.message, mtype:'err'});
    console.error(e);
  }
}

draw();
})();
</script>

</body>
</html>
